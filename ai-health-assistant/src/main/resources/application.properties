spring.application.name=ai-health-assistant
server.port=8080

# ---------- MySQL ----------
# Create the database first: CREATE DATABASE ai_health_assistant;
spring.datasource.url=jdbc:mysql://localhost:3306/ai_health_assistant?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ---------- Gemini AI ----------
# Get a key from https://aistudio.google.com/app/apikey
gemini.api.key=YOUR_GEMINI_API_KEY_HERE
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
